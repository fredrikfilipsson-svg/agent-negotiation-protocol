[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "anp-client"
version = "0.1.0"
description = "Python client for ANP/0.1, the Agent Negotiation Protocol: Ed25519 identity, signed requests, canonical JSON, and hash chain verification."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["anp", "agent-negotiation-protocol", "ed25519", "hash-chain", "ai-agents"]
dependencies = ["cryptography>=42"]

[project.urls]
Homepage = "https://aiaagentnetwork.com"
Repository = "https://github.com/fredrikfilipsson-svg/agent-negotiation-protocol"

[project.optional-dependencies]
test = ["pytest>=8"]

[tool.setuptools]
packages = ["anp_client"]
