name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build

  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build @anp/client
        working-directory: packages/anp-client
        run: |
          npm ci
          npm run build
          node -e "const c = require('./dist/index.js'); const log = require('../../protocol/examples/session-log.example.json'); c.verifyLog(log).then(v => { if (!v.ok) process.exit(1); console.log('example log verifies', v.verifiedCount + '/' + v.eventCount); })"
      - name: Build @anp/mcp-server
        working-directory: packages/anp-mcp
        run: |
          npm ci
          npm run build
