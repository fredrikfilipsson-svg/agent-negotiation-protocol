name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  python-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The live interop test spawns scripts/mock-buyer-host.mjs, which
      # imports ajv from the root node_modules.
      - run: npm ci
      - run: pip install "./packages/anp-client-py[test]"
      - run: python -m pytest packages/anp-client-py/tests -q

  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build @anp/client
        working-directory: packages/anp-client
        run: |
          npm ci
          npm run build
          node -e "const c = require('./dist/index.js'); const log = require('../../protocol/examples/session-log.example.json'); c.verifyLog(log).then(v => { if (!v.ok) process.exit(1); console.log('example log verifies', v.verifiedCount + '/' + v.eventCount); })"
      - name: Build @anp/mcp-server
        working-directory: packages/anp-mcp
        run: |
          npm ci
          npm run build
